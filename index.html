<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#111111" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<title>Cartografías Imposibles</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }

  canvas {
    display: block;
  }

  #position {
    position: fixed;
    bottom: 16px;
    left: 16px;
    font-family: monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    background: rgba(0,0,0,0.45);
    padding: 8px 12px;
    border-radius: 6px;
    pointer-events: none;
    line-height: 1.6;
    z-index: 999;
  }

  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 998;
  }

  #loading[hidden] {
    display: none !important;
  }

  .loading-card {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.8);
    background: rgba(0, 0, 0, 0.45);
    padding: 14px 18px;
    border-radius: 6px;
    min-width: 180px;
    text-align: center;
  }

  .loading-label {
    margin: 0 0 10px;
    letter-spacing: 0.02em;
  }

  .loading-track {
    position: relative;
    height: 2px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 1px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    width: 0%;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 1px;
    transition: width 0.15s ease-out;
  }

  .loading-bar--indeterminate {
    position: absolute;
    left: 0;
    top: 0;
    width: 35% !important;
    transition: none;
    animation: loading-slide 1.1s ease-in-out infinite;
  }

  @keyframes loading-slide {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(320%); }
  }
  /* Mobile Tweakpane styles */
  @media (max-width: 768px) {
    .tp-dfwv {
      position: fixed !important;
      top: auto !important;
      bottom: 0 !important;
      right: 0 !important;
      left: 0 !important;
      width: 100% !important;
      max-width: 100% !important;
      border-radius: 12px 12px 0 0 !important;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5) !important;
    }
    .tp-dfwv .tp-rotv {
      width: 100% !important;
    }
  }
</style>
</head>
<body>

<script src="./lib/grained.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.182.0",
    "three/addons/": "https://esm.sh/three@0.182.0/addons/",
    "tweakpane": "https://esm.sh/tweakpane@4.0.5",
    "three-text": "./lib/three-text/three/index.js",
    "woff-lib/woff2/decode": "./lib/woff-lib/woff2-decode.js",
    "brotli-lib/decode": "./lib/brotli-lib/decode.js"
  }
}
</script>

<script type="module" src="./src/main.js"></script>

<section id="position"></section>

<section id="loading" hidden aria-live="polite">
  <div class="loading-card">
    <p class="loading-label">Loading</p>
    <div class="loading-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
      <div class="loading-bar"></div>
    </div>
  </div>
</section>
</body>
</html>
