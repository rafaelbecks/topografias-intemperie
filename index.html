<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#111111" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<title>Cartografías Imposibles</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }

  canvas {
    display: block;
  }
  /* Mobile Tweakpane styles */
  @media (max-width: 768px) {
    .tp-dfwv {
      position: fixed !important;
      top: auto !important;
      bottom: 0 !important;
      right: 0 !important;
      left: 0 !important;
      width: 100% !important;
      max-width: 100% !important;
      border-radius: 12px 12px 0 0 !important;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5) !important;
    }
    .tp-dfwv .tp-rotv {
      width: 100% !important;
    }
  }
</style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.182.0",
    "three/addons/": "https://esm.sh/three@0.182.0/addons/",
    "tweakpane": "https://esm.sh/tweakpane@4.0.5"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { RGBELoader } from "three/addons/loaders/RGBELoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";
import { Pane } from "tweakpane";

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 240, 120);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.physicallyCorrectLights = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.setPixelRatio(window.devicePixelRatio);

const params = {
  lightIntensity: 2.8,
  ambient: 1.52,
  exposure: 1,
  roughness: 1,
  environment: "mpumalanga",
  bgBlur: 0,
  moveSpeed: 5,
  fpMove: true,
  autoRotate: false,
  rotateSpeed: 0.6
};

// ENVIRONMENT MAPS
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();

const rgbeLoader = new RGBELoader();

let currentEnvMap = null;

function loadEnvironment(path) {
  rgbeLoader.load(path, (hdr) => {

    const envMap = pmrem.fromEquirectangular(hdr).texture;

    scene.environment = envMap;   // lighting & reflections
    scene.background = envMap;    // visible sky (optional)
    scene.backgroundBlurriness = params.bgBlur;
    scene.backgroundIntensity = 1;

    if (currentEnvMap) currentEnvMap.dispose();
    currentEnvMap = envMap;
    light.intensity = 0;
    ambient.intensity = 0;
    hdr.dispose();
  });
}

document.body.appendChild(renderer.domElement);

// CONTROLS
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = params.autoRotate;
controls.autoRotateSpeed = params.rotateSpeed;

controls.addEventListener("start", () => {
  controls.autoRotate = false;
});

controls.addEventListener("end", () => {
  if (params.autoRotate) controls.autoRotate = true;
});

const clock = new THREE.Clock();
const moveState = { forward: false, backward: false, left: false, right: false };
const walkForward = new THREE.Vector3();
const walkRight = new THREE.Vector3();
const walkDelta = new THREE.Vector3();

function onKeyDown(e) {
  if (e.repeat) return;
  switch (e.code) {
    case "KeyW": moveState.forward = true; break;
    case "KeyS": moveState.backward = true; break;
    case "KeyA": moveState.left = true; break;
    case "KeyD": moveState.right = true; break;
    default: break;
  }
}

function onKeyUp(e) {
  switch (e.code) {
    case "KeyW": moveState.forward = false; break;
    case "KeyS": moveState.backward = false; break;
    case "KeyA": moveState.left = false; break;
    case "KeyD": moveState.right = false; break;
    default: break;
  }
}

window.addEventListener("keydown", onKeyDown);
window.addEventListener("keyup", onKeyUp);

function applyWalkMovement(delta) {
  if (!params.fpMove) return;
  const speed = params.moveSpeed * delta;
  camera.getWorldDirection(walkForward);
  walkForward.y = 0;
  if (walkForward.lengthSq() <= 1e-8) return;
  walkForward.normalize();
  walkRight.crossVectors(walkForward, camera.up).normalize();

  walkDelta.set(0, 0, 0);
  if (moveState.forward) walkDelta.addScaledVector(walkForward, speed);
  if (moveState.backward) walkDelta.addScaledVector(walkForward, -speed);
  if (moveState.right) walkDelta.addScaledVector(walkRight, speed);
  if (moveState.left) walkDelta.addScaledVector(walkRight, -speed);
  if (walkDelta.lengthSq() === 0) return;
  camera.position.add(walkDelta);
  controls.target.add(walkDelta);
}

// LIGHTS
const light = new THREE.DirectionalLight(0xffffff, 0);
light.position.set(50, 100, 50);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0);
scene.add(ambient);

let currentModel = null;
let loading = false;

const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);
function loadModel(name) {
  if (loading) return;
  loading = true;

  loader.load(`./glb/${name}.glb`, (gltf) => {

    // remove & dispose previous model
    if (currentModel) {
      scene.remove(currentModel);
      disposeModel(currentModel);
      currentModel = null;
    }

    const model = gltf.scene;
    currentModel = model;
    scene.add(model);

    // center model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    model.position.sub(center);

    // ensure env reflections update
    model.traverse((o) => {
      if (o.isMesh && o.material) {
        o.material.envMapIntensity = 1.0;
        o.material.needsUpdate = true;
      }
    });

    // camera framing
    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));

    cameraZ *= 1.4;

    camera.position.set(0, cameraZ * 0.6, cameraZ);
    camera.lookAt(0, 0, 0);

    controls.target.set(0, 0, 0);
    controls.maxDistance = cameraZ * 10;
    controls.update();

    loading = false;

  }, undefined, (err) => {
    console.error(err);
    loading = false;
  });
}


function disposeModel(object) {
  object.traverse((child) => {
    if (!child.isMesh) return;

    // dispose geometry
    child.geometry.dispose();

    // dispose material(s)
    const materials = Array.isArray(child.material)
      ? child.material
      : [child.material];

    materials.forEach(mat => {
      // dispose textures inside material
      for (const key in mat) {
        const value = mat[key];
        if (value && value.isTexture) {
          value.dispose();
        }
      }
      mat.dispose();
    });
  });
}


loadModel("cart2");
loadEnvironment("./env/belfast.hdr");

const pane = new Pane({ title: "Scene Controls" });

// Collapse pane on mobile by default
const isMobile = window.matchMedia("(max-width: 768px)").matches;
if (isMobile) {
  pane.expanded = false;
}

pane.addBlade({
  view: "list",
  label: "model",
  options: [
    { text: "El valle de las tres cumbres", value: "cart2" },
    { text: "Terreno de curvaturas continuas", value: "cart4" },
    { text: "Picos refractados del delirio", value: "cart5" },
    { text: "Dunas de hierro dormido", value: "cart6" },
    { text: "Mesetas de hielo fracturado", value: "cart7" },
    { text: "Fragmentos de un relieve desprendido", value: "cart8" },
    { text: "Bosque de laderas cerradas", value: "cart10" },
    { text: "Macizo flotante de amatista", value: "cart11" },
    { text: "El río que arde entre dos cráteres", value: "cart13" },
    { text: "La quebrada de ocre profundo", value: "cart14" },
    { text: "Macizo del pez erosionado", value: "cart15" },
    { text: "Organic model", value: "organic_model" }

  ],
  value: "cart2"
}).on("change", e => {
  loadModel(e.value);
});


pane.addBinding(params, "lightIntensity", { min:0, max:5 }).on("change", e => {
  light.intensity = e.value;
});

pane.addBinding(params, "ambient", { min:0, max:2 }).on("change", e => {
  ambient.intensity = e.value;
});

pane.addBinding(params, "exposure", { min:0.1, max:3 }).on("change", e => {
  renderer.toneMappingExposure = e.value;
});

pane.addBinding(params, "roughness", { min:0, max:1 }).on("change", e => {
  if (!currentModel) return;
  currentModel.traverse(o => {
    if (o.isMesh && o.material && o.material.roughness !== undefined) {
      o.material.roughness = e.value;
    }
  });
});

pane.addBinding(params, "environment", {
  options: {
    Belfast: 'belfast',
    Mpumalanga: 'mpumalanga',
    Orchard: 'orchard',
    Snow: "snow",
    Lenong: "lenong",
    Green: "green",
    Park: "park",
  }
}).on("change", e => {
  if (e.value === "none") {
    scene.environment = null;
    scene.background = new THREE.Color(0x111111);
    light.intensity = params.lightIntensity;
    ambient.intensity = params.ambient;
  } else {
    loadEnvironment(`./env/${e.value}.hdr`);
  }
});

pane.addBinding(params, "bgBlur", { min: 0, max: 1, step: 0.01 })
.on("change", e => {
  scene.backgroundBlurriness = e.value;
});

pane.addBinding(params, "fpMove", { label: "First person" }).on("change", e => {
  if (!e.value) {
    moveState.forward = false;
    moveState.backward = false;
    moveState.left = false;
    moveState.right = false;
  }
});

pane.addBinding(params, "moveSpeed", {
  label: "move speed",
  min: 1,
  max: 100,
  step: 1
});

pane.addBinding(params, "autoRotate").on("change", e => {
  controls.autoRotate = e.value;
});

pane.addBinding(params, "rotateSpeed", {
  min: 0,
  max: 5,
  step: 0.1
}).on("change", e => {
  controls.autoRotateSpeed = e.value;
});

// LOOP
function animate() {
  requestAnimationFrame(animate);
  applyWalkMovement(clock.getDelta());
  controls.update();
  renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
