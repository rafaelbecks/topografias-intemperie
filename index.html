<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.182.0",
    "three/addons/": "https://esm.sh/three@0.182.0/addons/",
    "tweakpane": "https://esm.sh/tweakpane@4.0.5",
    "howler": "https://esm.sh/howler@2.2.4",
    "three-text": "./lib/three-text/three/index.js",
    "woff-lib/woff2/decode": "./lib/woff-lib/woff2-decode.js",
    "brotli-lib/decode": "./lib/brotli-lib/decode.js"
  }
}
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#ffffff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon192.png" />
<title>topografías del desarraigo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ovo&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>

<script src="./lib/grained.js"></script>
<script type="module" src="./src/main.js"></script>

<button id="panel-toggle" type="button" aria-label="Open controls" aria-expanded="false" aria-controls="side-panel" hidden>
  <img src="./icons/shapes-outline.svg" alt="" width="24" height="24" />
</button>

<aside id="side-panel" class="hidden">
  <div id="side-panel-scroll"></div>
</aside>

<section id="position"></section>

<section id="loading" hidden aria-live="polite">
  <div class="loading-card">
    <p class="loading-label">Loading</p>
    <div class="loading-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
      <div class="loading-bar"></div>
    </div>
  </div>
</section>

<svg style="position: absolute; width: 0; height: 0" aria-hidden="true">
  <defs>
    <filter
      id="ditherFilter"
      color-interpolation-filters="sRGB"
      x="0"
      y="0"
      width="100%"
      height="100%"
    >
      <feFlood flood-color="#000000" flood-opacity="0.50" x="0%" y="0%" result="flood" />
      <feBlend mode="normal" x="0%" y="0%" in="SourceGraphic" in2="flood" result="blend1" />
      <feImage
        class="ditherImage"
        href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAA5ElEQVQYlQXBgQbCUABA0fdrk0ySSZJJkiRJMjOTTGZmkiRJZiYzyczMzGQmfdrtHPH7/TgcDuR5zna7pWka9vs9aZqyXq8R0+mU5/OJoihcLhfG4zFBENDtdjmdToj3+81yueTz+WCaJnEcM5/PKcsSXdcRsizjeR6j0YjH40Gr1cJxHAaDAbfbDVHXNbvdjiRJWK1WfL9fLMsiyzI2mw1CVVV836fT6XA8HplMJoRhSK/X43w+I6IoYjabURQFmqbxer1YLBZUVYVhGAhJkrBtm36/z/V6pd1u47ouw+GQ+/3OH4/Fn8FvF/NxAAAAAElFTkSuQmCC"
        x="0"
        y="0"
        width="4"
        height="4"
        crossorigin="anonymous"
        result="image1"
      />
      <feTile x="0" y="0" in="image1" result="tile" />
      <feBlend mode="overlay" x="0%" y="0%" in="blend1" in2="tile" result="blend2" />
      <feColorMatrix type="saturate" values="1" />
      <feComponentTransfer>
        <feFuncR type="discrete" tableValues="0 1" />
        <feFuncG type="discrete" tableValues="0 1" />
        <feFuncB type="discrete" tableValues="0 1" />
      </feComponentTransfer>
    </filter>
  </defs>
</svg>
</body>
</html>
